[project]
name = "ai-flywheel"
version = "0.1.0"
description = "A personal venture operating system — bottom-up, event-driven Layer 1 substrate."
readme = "new_docs/README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "structlog>=24.1",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# The dev introspection server (see new_docs/visualization.md). This is a
# dev-only, read-only surface — NOT the venture runtime or a production API.
devserver = [
    "fastapi>=0.110",
    "uvicorn>=0.29",
]
# Real lead-gen I/O (per new_docs/stack.md "lazy arrival"). The fakes need none
# of this; these only load when a venture runs the lead-sourcer `live`:
#   - httpx + tenacity: real ATS HTTP clients (free Greenhouse/Lever/Ashby APIs)
#     with retry/backoff.
#   - firecrawl-py: OPT-IN career-page enrichment (only used if FIRECRAWL_API_KEY
#     is set). Discovery via ATS APIs is free and needs no key.
lead-gen = [
    "httpx>=0.27",
    "tenacity>=8.2",
    "firecrawl-py>=2.0",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
    "mypy>=1.10",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "httpx>=0.27",
    "tenacity>=8.2",
    "types-PyYAML>=6.0",
    # For VS Code Python debugging (the extension bundles its own copy too,
    # but having it in the venv makes the env self-sufficient).
    "debugpy>=1.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["flywheel"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
