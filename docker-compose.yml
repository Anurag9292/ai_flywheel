services:
  # --- Infrastructure ---

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: flywheel
      POSTGRES_PASSWORD: flywheel_dev
      POSTGRES_DB: ai_flywheel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flywheel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=flywheel
      - POSTGRES_PWD=flywheel_dev
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # --- Application ---

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://flywheel:flywheel_dev@postgres:5432/ai_flywheel
      - DATABASE_URL_SYNC=postgresql://flywheel:flywheel_dev@postgres:5432/ai_flywheel
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=ai-flywheel-main
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ai_flywheel.worker"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://flywheel:flywheel_dev@postgres:5432/ai_flywheel
      - DATABASE_URL_SYNC=postgresql://flywheel:flywheel_dev@postgres:5432/ai_flywheel
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=ai-flywheel-main
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

  # --- Migrations (run once) ---

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://flywheel:flywheel_dev@postgres:5432/ai_flywheel
      - DATABASE_URL_SYNC=postgresql://flywheel:flywheel_dev@postgres:5432/ai_flywheel
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
