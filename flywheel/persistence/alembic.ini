# Alembic config for the ingestion persistence schema (Neon Postgres).
#
# The database URL is NOT stored here — it is read from the DB_URL environment
# variable in env.py (so the same migrations run against any Neon branch / DB).
#
# Usage (with the `db` extra installed and DB_URL set):
#   alembic -c flywheel/persistence/alembic.ini upgrade head
#
# Note: run migrations over Neon's DIRECT (non-pooled) connection string.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
